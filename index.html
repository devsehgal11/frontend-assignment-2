<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2a2a2a, #5a5a5a);
    padding: 20px;
}

.container {
    max-width: 1300px;
    margin: auto;
}

.parent-card {
    display: flex;
    gap: 20px;
}

h1 {
    text-align: center;
    color: #d0d0d0;
    margin-bottom: 20px;
}

.card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    width: 100%;
}

.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 2px solid #b0b0b0;
}

button {
    padding: 10px 20px;
    background: #808080;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.weather-item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-left: 4px solid #808080;
    margin-bottom: 6px;
    background: #f5f5f5;
}

.console {
    background: #2a2a2a;
    color: #d0d0d0;
    padding: 15px;
    border-radius: 8px;
    font-family: monospace;
    max-height: 250px;
    overflow-y: auto;
}

.log.async {
    border-left: 3px solid #808080;
    padding-left: 6px;
}

.log.promise {
    border-left: 3px solid #a0a0a0;
    padding-left: 6px;
}

.log.callback {
    border-left: 3px solid #c0c0c0;
    padding-left: 6px;
}

.history button {
    margin: 5px;
    padding: 6px 14px;
    border-radius: 20px;
}

@media (max-width:700px) {
    .parent-card {
        flex-direction: column;
    }
}
</style>

<body>
    <div class="container">

        <h1>Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>
    <script>
const API_KEY = "2f13d776c80cad5b55983fbd7664da3f";
const weatherBox = document.getElementById("weather");
const historyBox = document.getElementById("history");

async function getWeather(city) {

    const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
    );

    if (!res.ok) {
        alert("city not found");
        throw new Error("City not found");
    }

    const data = await res.json();
    return data;
}

 document.getElementById("searchBtn").onclick = () => {

    const city = cityInput.value.trim();
    if (city) {
        search(city);
    }

};

function renderWeather(d) {

    weatherBox.innerHTML = `
<div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
<div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
<div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
<div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
<div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
`;

}

function saveHistory(city) {
    let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
    
    history = history.filter(c => c !== city);
    
    history.unshift(city);
    
    history = history.slice(0, 5);
    
    localStorage.setItem("weatherHistory", JSON.stringify(history));
    showHistory();
}

function showHistory() {
    let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
    
    historyBox.innerHTML = "";
    
    if (history.length === 0) {
        historyBox.innerHTML = "<p>No search history yet</p>";
        return;
    }
    
    history.forEach(city => {
        const historyItem = document.createElement("div");
        historyItem.classList.add("history-item");
        historyItem.textContent = city;
        historyItem.onclick = () => {
            cityInput.value = city;
            search(city);
        };
        historyBox.appendChild(historyItem);
    });
}

async function search(city) {

    weatherBox.innerHTML = "";

    try {
        const data = await getWeather(city);
        renderWeather(data);
        saveHistory(data.name); 
    } catch (error) {
        weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
    }

}

cityInput.addEventListener("keydown", (e) => {

    if (e.key === "Enter") {
        const city = cityInput.value.trim();
        if (city) {
            search(city);
        }
    }

});

showHistory();
    </script>
</body>

</html>
